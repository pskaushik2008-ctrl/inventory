<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Grocery Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div class="hero-badge">Smart Inventory</div>
        <h1>Grocery Inventory Pro</h1>
        <p class="info-note">
          Static mode for GitHub Pages: data stays safely in your browser storage.
        </p>
      </header>

      <p id="message" class="message"></p>

      <section class="stats-grid">
        <article class="stat-card">
          <p class="stat-title">Total Items</p>
          <p class="stat-value" id="statItems">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">Total Quantity</p>
          <p class="stat-value" id="statQuantity">0</p>
        </article>
        <article class="stat-card">
          <p class="stat-title">Total Inventory Value</p>
          <p class="stat-value" id="statValue">0.00</p>
        </article>
      </section>

      <div class="card form-card">
        <h2 id="formTitle">Add New Entry</h2>

        <form id="itemForm">
          <input type="hidden" id="itemId" />

          <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" placeholder="Enter product name" required />
          </div>

          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" placeholder="Enter quantity" min="1" required />
          </div>

          <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" placeholder="Enter price" step="0.01" min="0" required />
          </div>

          <div class="form-group">
            <label for="amount">Amount (Auto Calculated)</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" readonly />
          </div>

          <div class="button-group">
            <button type="submit">Save Entry</button>
            <button type="button" id="cancelBtn" class="secondary hidden">Cancel Edit</button>
            <button type="button" id="clearBtn" class="danger">Clear All</button>
          </div>
        </form>
      </div>

      <div class="card table-card">
        <div class="table-head">
          <h2>Inventory Records</h2>
          <div class="table-tools">
            <input type="text" id="searchInput" placeholder="Search by ID or product..." />
            <select id="sortSelect">
              <option value="newest">Sort: Newest First</option>
              <option value="oldest">Sort: Oldest First</option>
              <option value="highAmount">Sort: Amount High to Low</option>
              <option value="lowAmount">Sort: Amount Low to High</option>
            </select>
            <button type="button" id="exportBtn" class="secondary">Export JSON</button>
            <label for="importFile" class="file-label">Import JSON</label>
            <input type="file" id="importFile" accept=".json" class="hidden-file" />
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
